<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Antigravity</title>
    
    <!-- Importando PyScript (que utiliza Pyodide/WebAssembly por trás) -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>
    
    <style>
        body {
            background-color: #1a1a1a; /* Cor de fundo mais moderna */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ff00; /* Verde retrô para Space Invaders */
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        #game-container {
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); /* Brilho ao redor do jogo */
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }
        canvas {
            display: block;
            background-color: #000;
        }
    </style>
</head>
<body>
    <h1>Space Invaders</h1>
    
    <!-- Contêiner do Jogo. O tamanho clássico escolhido foi 800x600 -->
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <!-- O Antigravity/Motor WebAssembly carregará o nosso main.py aqui -->
    <!-- Colocamos ?v=2 para que o navegador seja forçado a baixar o arquivo mais recente! -->
    <py-script src="./main.py?v=2"></py-script>

</body>
</html>
